<!-- FIELDS — RICH -->
  <div class="demo-section" id="richtext">
    <h2><code>bc-field-richtext</code></h2>
    <div class="demo-box">
      <bc-field-richtext name="d-rt" label="Content" hint="Rich text with toolbar"></bc-field-richtext>
    </div>
  </div>

  <div class="demo-section" id="markdown">
    <h2><code>bc-field-markdown</code></h2>
    <div class="demo-box">
      <bc-field-markdown name="d-md" label="README" hint="Write/Preview" max-length="2000" show-count></bc-field-markdown>
    </div>
  </div>

  <div class="demo-section" id="html">
    <h2><code>bc-field-html</code></h2>
    <div class="demo-box">
      <bc-field-html name="d-html" label="HTML" value="<h3>Hello</h3><p>World</p>" hint="Source/Preview"></bc-field-html>
    </div>
  </div>

  <div class="demo-section" id="code">
    <h2><code>bc-field-code</code></h2>
    <div class="demo-box">
      <div class="demo-row">
        <bc-field-code name="d-code-js" label="JavaScript" language="javascript" value="function hello() { return 'world'; }"></bc-field-code>
        <bc-field-code name="d-code-py" label="Python" language="python" value="def hello():&#10;    return 'world'"></bc-field-code>
      </div>
    </div>
  </div>

  <div class="demo-section" id="json">
    <h2><code>bc-field-json</code></h2>
    <div class="demo-box">
      <bc-field-json name="d-json" label="Config" value='{"key": "value", "count": 42}'></bc-field-json>
    </div>
  </div>
