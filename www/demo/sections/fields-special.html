<!-- FIELDS — SPECIAL -->
  <div class="demo-section" id="file">
    <h2><code>bc-field-file</code></h2>
    <div class="demo-box">
      <bc-field-file name="d-file" label="Attachment" accept=".pdf,.doc" max-size="5MB" hint="PDF/Word max 5MB"></bc-field-file>
    </div>
  </div>

  <div class="demo-section" id="image">
    <h2><code>bc-field-image</code></h2>
    <div class="demo-box">
      <bc-field-image name="d-img" label="Avatar" max-size="2MB" hint="Drag or click"></bc-field-image>
    </div>
  </div>

  <div class="demo-section" id="signature">
    <h2><code>bc-field-signature</code></h2>
    <div class="demo-box">
      <bc-field-signature name="d-sig" label="Signature" hint="Draw" width="400" height="150"></bc-field-signature>
    </div>
  </div>

  <div class="demo-section" id="barcode">
    <h2><code>bc-field-barcode</code></h2>
    <div class="demo-box">
      <div class="demo-row">
        <bc-field-barcode name="d-bc" label="Barcode" value="1234567890" format="code128"></bc-field-barcode>
        <bc-field-barcode name="d-qr" label="QR Code" value="https://bitcode.dev" format="qr"></bc-field-barcode>
      </div>
    </div>
  </div>
