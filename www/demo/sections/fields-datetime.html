<!-- FIELDS — DATE/TIME -->
  <div class="demo-section" id="date">
    <h2><code>bc-field-date</code></h2>
    <div class="demo-box">
      <div class="demo-row">
        <bc-field-date name="d-date" label="Start Date" required clearable></bc-field-date>
        <bc-field-date name="d-date2" label="End Date" clearable></bc-field-date>
      </div>
    </div>
  </div>

  <div class="demo-section" id="datetime">
    <h2><code>bc-field-datetime</code></h2>
    <div class="demo-box">
      <bc-field-datetime name="d-dt" label="Event DateTime" clearable></bc-field-datetime>
    </div>
  </div>

  <div class="demo-section" id="time">
    <h2><code>bc-field-time</code></h2>
    <div class="demo-box">
      <bc-field-time name="d-time" label="Meeting Time" clearable></bc-field-time>
    </div>
  </div>

  <div class="demo-section" id="duration">
    <h2><code>bc-field-duration</code></h2>
    <div class="demo-box">
      <bc-field-duration name="d-dur" label="Duration" hint="Hours and minutes" clearable></bc-field-duration>
    </div>
  </div>
